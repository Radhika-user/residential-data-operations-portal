<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #1e5c84, #6aa0c5);
            color: white;
        }

        .wrapper {
            width: 75%;
            margin: 60px auto;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
        }

        .flex {
            display: flex;
            gap: 40px;
        }

        .card {
            flex: 1;
            padding: 25px;
            border-radius: 15px;
            background: rgba(255,255,255,0.15);
        }

        .green {
            background: linear-gradient(135deg, #7dbb3a, #9fd34f);
            color: black;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            margin-right: 5px;
            cursor: pointer;
        }

        .preview { background: #ffe066; }
        .reset { background: #f7c948; }
        .stop { background: #e74c3c; color: white; }
        .download { background: #4caf50; color: white; }

        table {
            width: 100%;
            margin-top: 20px;
            background: white;
            color: black;
            border-collapse: collapse;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ccc;
        }

        .logout {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="wrapper">

    <h1>Residential Data Operations Portal</h1>
    <p>Stored Procedures & Table Access</p>

    <div class="flex">

        <!-- LEFT -->
        <div class="card">
            <h3>Run Stored Procedure</h3>

            <form method="POST">
                <input type="hidden" name="action" value="run_sp">

                <select name="sp_name">
                    <option value="sp_UpdateResidentialData_CAD">EXEC dbo.sp_UpdateResidentialData_CAD;</option>
                    <option value="Send_CommercialSales_Core_Report">EXEC Send_CommercialSales_Core_Report;</option>
                    <option value="Send_CommercialSales_NonCore_Report">EXEC Send_CommercialSales_NonCore_Report;</option>
                    <option value="usp_Load_Clickhouse_Sales">EXEC dbo.usp_Load_Clickhouse_Sales;</option>
                </select>

                <button class="btn">Run</button>
            </form>
        </div>

        <!-- RIGHT -->
        <div class="card green">
            <h3>Table Access</h3>

            <form method="POST">

                <input type="hidden" name="action" value="preview">

                <select>
                    <option>TaxRoll_2026</option>
                </select>

                <input name="cad" placeholder="CAD Account Number (comma/new line supported)">
                <input name="address" placeholder="Property Address">
                <input name="parcel" placeholder="Parcel ID">
                <input name="cadid" placeholder="CAD ID">

                <button class="btn preview">Preview</button>
                <button type="reset" class="btn reset">Reset</button>
                <button type="button" class="btn stop">Stop</button>

                <button type="submit"
                        formaction="/download_excel"
                        formmethod="POST"
                        class="btn download">
                    Download Excel
                </button>

            </form>
        </div>

    </div>

    <h3>Preview Output</h3>

    {% if results %}
    <table>
        <tr>
            {% for col in columns %}
            <th>{{ col }}</th>
            {% endfor %}
        </tr>

        {% for row in results %}
        <tr>
            {% for cell in row %}
            <td>{{ cell }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>
    {% endif %}

</div>

<a href="/logout" class="logout">Logout</a>

</body>
</html>
